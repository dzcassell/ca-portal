services:
  byod-cert-portal:
    build: .
    container_name: byod-cert-portal
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      PORTAL_NAME: "Cato BYOD Certificate Setup"
      COMPANY_NAME: "Example Company"
      CERT_DISPLAY_NAME: "Cato Networks Root CA"
      CERT_FILENAME: "cato-root-ca.cer"
      SUPPORT_EMAIL: "helpdesk@example.com"
      VERIFY_URL: "https://example.com"
      IOS_PROFILE_IDENTIFIER: "com.example.cato.rootca"
    volumes:
      - ./certs:/app/certs:ro
