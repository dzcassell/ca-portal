<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ portal_name }}</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f5f7fb; color: #172033; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 32px 20px; }
    .card { background: #fff; border-radius: 18px; padding: 28px; box-shadow: 0 12px 40px rgba(18,32,51,.08); margin-bottom: 20px; }
    h1 { margin-top: 0; font-size: 2rem; } h2 { margin-top: 1.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 14px; }
    .button { display: inline-block; padding: 12px 16px; border-radius: 12px; background: #172033; color: white; text-decoration: none; font-weight: 700; margin: 4px 6px 4px 0; }
    .secondary { background: #e9eef8; color: #172033; }
    code, pre { background: #101828; color: #f8fafc; border-radius: 12px; } code { padding: 2px 6px; } pre { padding: 16px; overflow: auto; }
    .notice { border-left: 5px solid #d97706; padding: 12px 16px; background: #fff7ed; border-radius: 12px; }
    .ok { border-left-color: #059669; background: #ecfdf5; }
    .fingerprint { overflow-wrap: anywhere; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .95rem; }
    li { margin: .45rem 0; }
    footer { color: #667085; font-size: .9rem; }
  </style>
</head>
<body>
<main class="wrap">
  {% block content %}{% endblock %}
  <footer>Need help? Contact <a href="mailto:{{ support_email }}">{{ support_email }}</a>.</footer>
</main>
</body>
</html>
