<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ portal_name }}</title>
  <style>
    :root { color-scheme: light; --ink: #18202f; --muted: #5b6475; --line: #d8dfeb; --panel: #fff; --action: #14532d; --action-2: #243044; --warn: #9a3412; --warn-bg: #fff7ed; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f5f7fb; color: var(--ink); }
    .wrap { max-width: 980px; margin: 0 auto; padding: 28px 18px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 24px; box-shadow: 0 10px 30px rgba(24,32,47,.07); margin-bottom: 18px; }
    h1 { margin: 0 0 12px; font-size: 2rem; line-height: 1.1; } h2 { margin-top: 1.4rem; }
    .lede { color: var(--muted); font-size: 1.08rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(170px,1fr)); gap: 12px; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
    .button { display: inline-flex; align-items: center; justify-content: center; min-height: 46px; padding: 12px 16px; border-radius: 8px; background: var(--action); color: white; text-decoration: none; font-weight: 700; }
    .secondary { background: #e8edf5; color: var(--action-2); }
    .button:hover { filter: brightness(.96); }
    code, pre { background: #111827; color: #f8fafc; border-radius: 8px; } code { padding: 2px 6px; } pre { padding: 16px; overflow: auto; }
    .notice { border-left: 5px solid var(--warn); padding: 12px 16px; background: var(--warn-bg); border-radius: 8px; }
    .ok { border-left-color: #047857; background: #ecfdf5; }
    .detected { border: 1px solid #b7dcc8; background: #f0fdf4; border-radius: 8px; padding: 14px 16px; margin-top: 16px; }
    .fingerprint { overflow-wrap: anywhere; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .95rem; }
    li { margin: .45rem 0; }
    footer { color: #667085; font-size: .9rem; }
  </style>
</head>
<body>
<main class="wrap">
  {% block content %}{% endblock %}
  <footer>Need help? Contact <a href="mailto:{{ support_email }}">{{ support_email }}</a>.</footer>
</main>
</body>
</html>
